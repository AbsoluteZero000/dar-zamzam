<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0891b2" />
    <title>دار زمزم — غير متصل</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: radial-gradient(circle at top right, #cffafe, transparent 55%), #f8fafc;
        color: #164e63;
        font-family: Arial, sans-serif;
      }
      main {
        width: min(100%, 420px);
        padding: 32px;
        text-align: center;
        border: 1px solid #a5f3fc;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 50px rgba(14, 116, 144, 0.12);
      }
      .drop { font-size: 56px; }
      h1 { margin: 14px 0 8px; font-size: 24px; }
      p { margin: 0 0 24px; color: #477684; line-height: 1.8; }
      button {
        border: 0;
        border-radius: 12px;
        padding: 12px 22px;
        background: #0891b2;
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="drop" aria-hidden="true">💧</div>
      <h1>لا يوجد اتصال بالإنترنت</h1>
      <p>اتصل بالإنترنت ثم حاول مرة أخرى. لا تُخزّن بيانات الحضور الخاصة على هذا الجهاز دون اتصال.</p>
      <button type="button" onclick="location.reload()">إعادة المحاولة</button>
    </main>
  </body>
</html>
