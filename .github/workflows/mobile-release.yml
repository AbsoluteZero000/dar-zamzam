name: Mobile APK release

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag, for example mobile-v1.0.0"
        required: false
        type: string
  push:
    tags:
      - "mobile-v*"

concurrency:
  group: mobile-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  android-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - run: npm ci
      - run: npm run typecheck

      - name: Verify EAS project is linked
        run: |
          node -e '
            const config = require("./app.json");
            if (!config.expo?.extra?.eas?.projectId) {
              throw new Error(
                "EAS project is not linked. Run `npx eas-cli init` in mobile/ and commit the generated projectId."
              );
            }
          '

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build signed APK
        run: >
          eas build
          --platform android
          --profile apk
          --non-interactive
          --wait
          --json
          > "$RUNNER_TEMP/eas-build.json"

      - name: Download APK
        id: apk
        env:
          MANUAL_TAG: ${{ inputs.release_tag }}
        run: |
          BUILD_URL="$(
            jq -r '
              (if type == "array" then .[0] else . end)
              | .artifacts.buildUrl // empty
            ' "$RUNNER_TEMP/eas-build.json"
          )"
          test -n "$BUILD_URL"

          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            RELEASE_TAG="$GITHUB_REF_NAME"
          else
            RELEASE_TAG="$MANUAL_TAG"
          fi

          FILE_SUFFIX="${RELEASE_TAG:-build-${GITHUB_RUN_NUMBER}}"
          FILE_SUFFIX="$(printf '%s' "$FILE_SUFFIX" | tr -c 'A-Za-z0-9._-' '-')"
          APK_PATH="$RUNNER_TEMP/zamzam-${FILE_SUFFIX}.apk"
          curl --fail --location --retry 3 "$BUILD_URL" --output "$APK_PATH"

          {
            echo "path=$APK_PATH"
            echo "name=zamzam-${FILE_SUFFIX}.apk"
            echo "release_tag=$RELEASE_TAG"
          } >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.apk.outputs.name }}
          path: ${{ steps.apk.outputs.path }}
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: steps.apk.outputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.apk.outputs.release_tag }}
          APK_PATH: ${{ steps.apk.outputs.path }}
          APK_NAME: ${{ steps.apk.outputs.name }}
        working-directory: .
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$APK_PATH#$APK_NAME" --clobber
          else
            gh release create "$RELEASE_TAG" "$APK_PATH#$APK_NAME" \
              --title "Zamzam Android $RELEASE_TAG" \
              --generate-notes
          fi
